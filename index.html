<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SIGEC - Segurança Pública</title>
    <style>
        /* ===== RESET E BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 4px;
        }

        /* ===== CONTAINER PRINCIPAL ===== */
        #app {
            max-width: 500px;
            width: 100%;
            min-height: 95vh;
            background: #2c2c2c;
            border-radius: 28px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            padding: 20px 18px 30px;
            transition: all 0.3s;
            border: 1px solid #3d3d3d;
            display: flex;
            flex-direction: column;
        }

        /* ===== TELA DE LOGIN ===== */
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 30px 0 20px;
        }

        #loginScreen h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #f5c842;
            text-shadow: 0 0 12px #f5c84255;
            border-bottom: 2px solid #f5c842;
            padding-bottom: 8px;
            width: 100%;
            text-align: center;
        }

        #loginScreen .sub {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: -12px;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 40px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .login-input:focus {
            border-color: #f5c842;
            box-shadow: 0 0 0 2px #f5c84233;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: #f5c842;
            color: #1a1a1a;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px #f5c84233;
        }

        .btn-login:active {
            transform: scale(0.96);
            background: #e0b032;
        }

        /* ===== HEADER / DASHBOARD ===== */
        #dashboard {
            display: none;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .header-dash {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 8px;
            gap: 20px;
            position: relative;
        }

        .header-dash::after {
            content: "";
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #0b4b8a, #f5c842, #0b4b8a);
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 18px;
            flex: 1;
            min-width: 0;
        }

        .header-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-header {
            background: transparent;
            border: 1px solid #444;
            color: #ccc;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .btn-header:active {
            transform: scale(0.94);
        }

        .cadastrar-btn {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            color: #111;
            border: 2px solid #ffffff;
            font-weight: 800;
            box-shadow: 0 0 8px #00ff88, 0 0 18px #00ccff, 0 0 28px #ffffff;
            animation: pulseCadastro 1.5s infinite;
        }

        @keyframes pulseCadastro {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .btn-header.sair {
            border-color: #b33;
            color: #f66;
        }

        /* ===== CARDS ===== */
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 4px 0;
            flex: 1;
            justify-content: center;
        }

        .card {
            background: #3b2b1a;
            border-radius: 24px;
            padding: 42px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 2px solid #00aaff;
            box-shadow: 0 0 5px #00aaff, 0 0 12px #00aaff, 0 0 20px #ffffff, 0 0 30px #ffffff, 0 0 40px #66ccff, 0 4px 12px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            min-height: 280px;
        }

        .card:active {
            transform: scale(0.97);
            box-shadow: 0 0 5px #d4af37, 0 0 15px #ffff00, 0 0 25px #ccff00, 0 0 35px #99ff00;
        }

        .card h3 {
            font-size: 2rem;
            color: #f5e6c8;
            letter-spacing: 0.5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            text-align: center;
        }

        .card .badge {
            background: #f5c842;
            color: #1a1a1a;
            font-weight: 900;
            border-radius: 40px;
            font-size: 3.5rem;
            padding: 12px 30px;
            min-width: 120px;
            text-align: center;
        }

        .card .card-sub {
            font-size: 1rem;
            color: #d6d6d6;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .card.mandados {
            border: 2px solid #00ff66;
            box-shadow: 0 0 4px #00ff66, 0 0 10px #00ff66, 0 0 16px #ffff00, 0 0 24px #ffff00, 0 0 32px #ff3300, 0 0 42px #ff0000, 0 4px 12px rgba(0,0,0,0.5);
            animation: neonMandado 2s infinite;
        }

        @keyframes neonMandado {
            0% { box-shadow: 0 0 4px #00ff66, 0 0 10px #00ff66, 0 0 16px #ffff00, 0 0 24px #ffff00, 0 0 32px #ff3300; }
            50% { box-shadow: 0 0 8px #00ff66, 0 0 18px #00ff66, 0 0 28px #ffff00, 0 0 38px #ff3300, 0 0 50px #ff0000; }
            100% { box-shadow: 0 0 4px #00ff66, 0 0 10px #00ff66, 0 0 16px #ffff00, 0 0 24px #ffff00, 0 0 32px #ff3300; }
        }

        #cardAnotacoes {
            animation: neonAzul 2s infinite;
        }

        @keyframes neonAzul {
            0% { box-shadow: 0 0 5px #00aaff, 0 0 12px #00aaff, 0 0 20px #ffffff, 0 0 30px #66ccff; }
            50% { box-shadow: 0 0 10px #00aaff, 0 0 20px #00aaff, 0 0 35px #ffffff, 0 0 50px #66ccff; }
            100% { box-shadow: 0 0 5px #00aaff, 0 0 12px #00aaff, 0 0 20px #ffffff, 0 0 30px #66ccff; }
        }

        /* ===== PÁGINAS DE LISTA ===== */
        .list-page {
            display: none;
            flex-direction: column;
            gap: 16px;
            height: 100%;
        }

        .detail-page {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .form-page {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .list-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #444;
        }

        .btn-back {
            background: #f5c842;
            color: #1a1a1a;
            border: none;
            border-radius: 12px;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(245,200,66,.45);
            transition: .2s;
        }

        .btn-back:hover {
            transform: translateY(-2px);
        }

        .btn-back:active {
            transform: scale(.95);
        }

        .list-title {
            font-size: 1.3rem;
            font-weight: 600;
            flex: 1;
        }

        .list-item {
            background: #252525;
            border-radius: 16px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-left: 4px solid #f5c842;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .list-item .avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #3a3a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #f5c842;
            overflow: hidden;
            flex-shrink: 0;
        }

        .list-item .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .list-item .info {
            flex: 1;
        }

        .list-item .info .nome {
            font-weight: 600;
            font-size: 1rem;
        }

        .list-item .info .mae {
            font-size: 0.8rem;
            color: #aaa;
        }

        .list-item .seta {
            font-size: 1.8rem;
            color: #f5c842;
            cursor: pointer;
            padding: 0 6px;
        }

        /* ===== DETALHES ===== */
        .detail-page {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .detail-card {
            background: #222;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #3d3d3d;
        }

        .detail-field {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #2e2e2e;
            font-size: 0.95rem;
        }

        .detail-field .label {
            color: #aaa;
        }

        .detail-field .value {
            font-weight: 500;
            text-align: right;
            max-width: 60%;
        }

        .detail-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
            justify-content: center;
        }

        .btn-detail {
            background: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: #eee;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1 0 auto;
            min-width: 80px;
            transition: 0.2s;
            border: 1px solid #555;
        }

        .btn-detail:active {
            transform: scale(0.95);
        }

        .btn-detail.editar {
            background: #f5c842;
            color: #1a1a1a;
            border-color: #f5c842;
        }

        .btn-detail.compartilhar {
            background: #25D366;
            color: #fff;
            border-color: #25D366;
            box-shadow: 0 0 10px rgba(37, 211, 102, 0.4);
        }

        .btn-detail.pdf {
            background: #38bdf8;
            color: #ffffff;
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56,189,248,0.6);
        }

        /* Botão ABRIR IMAGEM */
        .btn-detail.abrir-imagem {
            background: linear-gradient(135deg, #ff6f00, #ff9100);
            color: #fff;
            border-color: #ff6f00;
            box-shadow: 0 0 20px rgba(255, 111, 0, 0.6);
            font-weight: 700;
            animation: pulseAbrir 2s infinite;
            padding: 12px 24px;
            font-size: 1rem;
        }

        @keyframes pulseAbrir {
            0% { box-shadow: 0 0 10px rgba(255, 111, 0, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 30px rgba(255, 111, 0, 0.8); transform: scale(1.02); }
            100% { box-shadow: 0 0 10px rgba(255, 111, 0, 0.4); transform: scale(1); }
        }

        .btn-detail.abrir-imagem:active {
            transform: scale(0.95);
        }

        /* ===== FORMULÁRIO ===== */
        .form-page {
            display: none;
            flex-direction: column;
            gap: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 0.8rem;
            color: #aaa;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .form-group input,
        .form-group select {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #f5c842;
        }

        .form-group input:disabled {
            opacity: 0.5;
            background: #2a2a2a;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-form {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-form.salvar {
            background: #f5c842;
            color: #1a1a1a;
        }

        .btn-form.cancelar {
            background: #3d3d3d;
            color: #ccc;
        }

        .btn-form:active {
            transform: scale(0.95);
        }

        /* ===== SENHA ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }

        .modal-box {
            background: #2c2c2c;
            border-radius: 28px;
            padding: 28px 24px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #f5c84255;
        }

        .modal-box h3 {
            margin-bottom: 16px;
            color: #f5c842;
        }

        .modal-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 14px;
        }

        .modal-box .btn-group {
            display: flex;
            gap: 12px;
        }

        .modal-box .btn-group button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
        }

        .modal-box .btn-group .alterar {
            background: #f5c842;
            color: #1a1a1a;
        }

        .modal-box .btn-group .cancelar-modal {
            background: #3d3d3d;
            color: #ccc;
        }

        /* ===== UTILITÁRIOS ===== */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .mt-8 {
            margin-top: 8px;
        }

        .mb-8 {
            margin-bottom: 8px;
        }

        .w-full {
            width: 100%;
        }

        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-upload-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-label {
            background: #333;
            padding: 12px 16px;
            border-radius: 12px;
            display: block;
            border: 1px solid #555;
            color: #ccc;
            text-align: center;
            cursor: pointer;
        }

        /* ===== SCROLL ===== */
        .scroll-area {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding-right: 4px;
        }

        .scroll-area::-webkit-scrollbar {
            width: 4px;
        }

        .scroll-area::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .scroll-area::-webkit-scrollbar-thumb {
            background: #f5c842;
            border-radius: 10px;
        }

        /* ===== FOTO DETALHAMENTO ===== */
        .detail-photo-header {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .detail-photo {
            width: 180px;
            height: 220px;
            object-fit: cover;
            border-radius: 14px;
            border: 2px solid #f5c842;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(245,200,66,0.4);
            transition: 0.2s;
        }

        .detail-photo:active {
            transform: scale(0.98);
        }

        /* Modal da imagem */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .image-modal img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 12px;
            border: 2px solid #f5c842;
        }

        /* ===== LOADING ===== */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #444;
            border-top-color: #f5c842;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #f5c842;
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* ===== ESTILO DA IMAGEM GERADA ===== */
        .ficha-image-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            touch-action: none;
        }

        .ficha-image-container img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,.45);
            display: block;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
            pointer-events: auto;
            cursor: pointer;
        }

        .ficha-image-container .long-press-indicator {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #f5c842;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid #f5c84255;
        }

        .ficha-image-container .long-press-indicator.active {
            opacity: 1;
        }

        .ficha-image-container .long-press-indicator.progress {
            animation: pulseProgress 0.5s ease-in-out;
        }

        @keyframes pulseProgress {
            0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.7; transform: translateX(-50%) scale(1.05); }
        }

        .ficha-image-container .copy-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 16px 28px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-align: center;
            border: 2px solid #f5c842;
            box-shadow: 0 0 30px rgba(245,200,66,0.3);
            z-index: 10;
            max-width: 90%;
        }

        .ficha-image-container .copy-toast.show {
            opacity: 1;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 480px) {
            #app {
                padding: 16px 14px 24px;
            }

            .header-dash {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }

            .logo-area {
                justify-content: center;
            }

            .logo-brasao {
                width: 92px;
                height: 92px;
                object-fit: contain;
                flex-shrink: 0;
            }

            .logo-title {
                font-size: 42px;
                font-weight: 900;
                letter-spacing: 3px;
                color: white;
                line-height: 1;
                text-shadow: 0 0 8px rgba(255,255,255,.35);
            }

            .logo-title span {
                color: #f5c842;
            }

            .logo-subtitle {
                margin-top: 5px;
                font-size: 15px;
                font-weight: 700;
                line-height: 1.25;
                color: #f5c842;
                letter-spacing: 1px;
                text-transform: uppercase;
            }

            .logo-brasao {
                width: 82px;
                height: auto;
                flex-shrink: 0;
                filter: drop-shadow(0 0 6px rgba(255,215,0,.6)) drop-shadow(0 0 10px rgba(0,153,255,.35));
            }

            .logo-info {
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .logo-title {
                font-size: 2.3rem;
                font-weight: 900;
                letter-spacing: 2px;
                color: #ffffff;
                line-height: 1;
            }

            .logo-title span {
                color: #f5c842;
            }

            .logo-subtitle {
                margin-top: 6px;
                font-size: .82rem;
                line-height: 1.25;
                color: #f5c842;
                font-weight: 700;
                letter-spacing: .8px;
                text-transform: uppercase;
            }

            .header-actions {
                justify-content: center;
                margin-left: 0;
            }

            .btn-header {
                font-size: 0.7rem;
                padding: 6px 12px;
                flex: 1;
                text-align: center;
                min-width: 60px;
            }

            .card {
                padding: 48px 32px;
                min-height: 320px;
            }

            .card h3 {
                font-size: 1.2rem;
            }

            .card .badge {
                font-size: 1rem;

        // ============================================================
        // FUNÇÃO PARA FORMATAR DATA
        // ============================================================
        function formatarData(data) {
            if (!data || data === 'N/I' || data === '—') return 'N/I';

            if (typeof data === 'string' && (data.includes('GMT') || data.includes('T') || data.includes('-'))) {
                try {
                    const date = new Date(data);
                    if (!isNaN(date.getTime())) {
                        const dia = String(date.getDate()).padStart(2, '0');
                        const mes = String(date.getMonth() + 1).padStart(2, '0');
                        const ano = date.getFullYear();
                        return `${dia}/${mes}/${ano}`;
                    }
                } catch (e) {
                    return data;
                }
            }

            if (typeof data === 'string' && /^\d{2}\/\d{2}\/\d{4}$/.test(data)) {
                return data;
            }

            try {
                const date = new Date(data);
                if (!isNaN(date.getTime())) {
                    const dia = String(date.getDate()).padStart(2, '0');
                    const mes = String(date.getMonth() + 1).padStart(2, '0');
                    const ano = date.getFullYear();
                    return `${dia}/${mes}/${ano}`;
                }
            } catch (e) {}

            return data;
        }

        // ============================================================
        // FUNÇÃO DE LONG PRESS
        // ============================================================
        function iniciarLongPress() {
            const container = document.getElementById('fichaImageContainer');
            const img = document.getElementById('fichaImage');
            const indicator = document.getElementById('longPressIndicator');

            if (!container || !img) {
                console.warn('Elementos do long press não encontrados');
                return;
            }

            let timerId = null;
            let isLongPress = false;
            let touchStartTime = 0;

            function startTimer(e) {
                e.preventDefault();
                isLongPress = false;
                touchStartTime = Date.now();

                if (timerId) {
                    clearTimeout(timerId);
                    timerId = null;
                }

                if (indicator) {
                    indicator.textContent = '⏳ Mantenha pressionado...';
                    indicator.classList.add('active');
                    indicator.classList.add('progress');
                }

                timerId = setTimeout(() => {
                    isLongPress = true;
                    if (indicator) {
                        indicator.textContent = '📸 Abrindo...';
                    }
                    
                    abrirImagemCompleta();
                    
                    setTimeout(() => {
                        if (indicator) {
                            indicator.classList.remove('active');
                            indicator.classList.remove('progress');
                        }
                    }, 800);
                    
                    timerId = null;
                }, 3000);
            }

            function endTimer(e) {
                if (e) e.preventDefault();
                
                if (timerId) {
                    clearTimeout(timerId);
                    timerId = null;
                }
                
                if (!isLongPress && Date.now() - touchStartTime > 500) {
                    if (indicator) {
                        indicator.textContent = '📌 Mantenha pressionado por 3 segundos';
                        setTimeout(() => {
                            if (indicator) {
                                indicator.classList.remove('active');
                            }
                        }, 1000);
                    }
                }
                
                if (indicator) {
                    indicator.classList.remove('active');
                    indicator.classList.remove('progress');
                }
                img.style.opacity = '1';
            }

            // Eventos para mouse
            img.addEventListener('mousedown', function(e) {
                this.style.opacity = '0.85';
                startTimer(e);
            });

            img.addEventListener('mouseup', endTimer);
            img.addEventListener('mouseleave', endTimer);

            // Eventos para touch (mobile)
            img.addEventListener('touchstart', function(e) {
                e.preventDefault();
                this.style.opacity = '0.85';
                startTimer(e);
            }, { passive: false });

            img.addEventListener('touchend', function(e) {
                e.preventDefault();
                this.style.opacity = '1';
                endTimer(e);
            }, { passive: false });

            img.addEventListener('touchcancel', function(e) {
                e.preventDefault();
                this.style.opacity = '1';
                endTimer(e);
            }, { passive: false });

            // Prevenir menu de contexto
            img.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });

            img.addEventListener('selectstart', function(e) {
                e.preventDefault();
                return false;
            });

            console.log('Long press inicializado com sucesso!');
        }

        // ============================================================
        // FUNÇÕES DE API
        // ============================================================

        function callAPIGet(action, data = {}, callback) {
            const callbackName = 'jsonp_' + action + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);

            let url = API_URL + '?action=' + encodeURIComponent(action) + '&callback=' + encodeURIComponent(callbackName);

            for (let key in data) {
                if (data[key] !== undefined && data[key] !== null) {
                    if (typeof data[key] === 'object') {
                        url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(JSON.stringify(data[key]));
                    } else {
                        url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(data[key]);
                    }
                }
            }

            window[callbackName] = function(response) {
                delete window[callbackName];
                if (callback) callback(response);
            };

            const script = document.createElement('script');
            script.src = url + '&_nocache=' + Date.now();
            script.onerror = function() {
                delete window[callbackName];
                if (callback) callback({ success: false, message: 'Erro na comunicação com o servidor.' });
            };
            document.body.appendChild(script);
        }

        function callAPIPost(action, data = {}) {
            return new Promise((resolve, reject) => {
                const payload = {
                    action: action,
                    ...data
                };

                const options = {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                };

                fetch(API_URL, options)
                    .then(response => {
                        resolve({ success: true, message: 'Operação realizada com sucesso!' });
                    })
                    .catch(error => {
                        console.error('Erro no POST:', error);
                        resolve({ success: false, message: 'Erro na comunicação: ' + error.message });
                    });
            });
        }

        function callAPI(action, data = {}) {
            if (action === 'getRecords' || action === 'getLogin') {
                return new Promise((resolve) => {
                    callAPIGet(action, data, function(response) {
                        resolve(response);
                    });
                });
            } else {
                return callAPIPost(action, data);
            }
        }

        // ============================================================
        // FUNÇÃO PARA REDIMENSIONAR IMAGEM
        // ============================================================
        function resizeImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round(height * (maxWidth / width));
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round(width * (maxHeight / height));
                                height = maxHeight;
                            }
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const dataUrl = canvas.toDataURL('image/jpeg', quality || 0.4);
                        resolve(dataUrl);
                    };
                    img.onerror = function() {
                        reject(new Error('Erro ao carregar imagem'));
                    };
                    img.src = e.target.result;
                };
                reader.onerror = function() {
                    reject(new Error('Erro ao ler arquivo'));
                };
                reader.readAsDataURL(file);
            });
        }

                }
            }
        }

        async function salvarEdicao(id) {
            const record = {
                FOTO: document.getElementById('e_foto') ? document.getElementById('e_foto').value || '' : '',
                NOME: document.getElementById('e_nome') ? document.getElementById('e_nome').value.trim() : '',
                ALCUNHA: document.getElementById('e_alcunha') ? document.getElementById('e_alcunha').value.trim() : '',
                MAE: document.getElementById('e_mae') ? document.getElementById('e_mae').value.trim() : '',
                PAI: document.getElementById('e_pai') ? document.getElementById('e_pai').value.trim() : '',
                DATA_NASC: document.getElementById('e_data_nasc') ? document.getElementById('e_data_nasc').value.trim() :
                    '',
                NATURALIDADE: document.getElementById('e_naturalidade') ? document.getElementById('e_naturalidade').value
                    .trim() : '',
                UF_NAT: document.getElementById('e_uf_nat') ? document.getElementById('e_uf_nat').value.trim() : '',
                CPF: document.getElementById('e_cpf') ? document.getElementById('e_cpf').value.trim() : '',
                RG: document.getElementById('e_rg') ? document.getElementById('e_rg').value.trim() : '',
                UF_RG: document.getElementById('e_uf_rg') ? document.getElementById('e_uf_rg').value.trim() : '',
                TELEFONE: document.getElementById('e_telefone') ? document.getElementById('e_telefone').value.trim() : '',
                ENDERECO: document.getElementById('e_endereco') ? document.getElementById('e_endereco').value.trim() : '',
                CIDADE: document.getElementById('e_cidade') ? document.getElementById('e_cidade').value.trim() : '',
                ESTADO: document.getElementById('e_estado') ? document.getElementById('e_estado').value.trim() : '',
                TIPO_PENAL: document.getElementById('e_tipo_penal') ? document.getElementById('e_tipo_penal').value.trim() :
                    '',
                MANDADO: document.getElementById('e_mandado') ? document.getElementById('e_mandado').value : 'NÃO'
            };

            if (!record.NOME) {
                alert('O campo NOME é obrigatório.');
                return;
            }

            try {
                const result = await callAPI('updateRecord', {
                    id: id,
                    record: record,
                    usuario: currentUser
                });
                if (result.success) {
                    alert('Registro atualizado com sucesso!');
                    await loadRecords();
                    backToList();
                } else {
                    alert('Erro ao atualizar: ' + result.message);
                }
            } catch (e) {
                alert('Erro de comunicação: ' + e.message);
            }
        }

        // ============================================================
        // SENHA
        // ============================================================
        function openSenha() {
            document.getElementById('modalSenha').style.display = 'flex';
            document.getElementById('novaSenhaInput').value = '';
            document.getElementById('confirmSenhaInput').value = '';
            document.getElementById('senhaMsg').textContent = '';
            document.getElementById('senhaMsg').style.color = '#f5c842';
        }

        function fecharModalSenha() {
            document.getElementById('modalSenha').style.display = 'none';
        }

        async function alterarSenha() {
            const nova = document.getElementById('novaSenhaInput').value.trim();
            const conf = document.getElementById('confirmSenhaInput').value.trim();

            if (!nova || nova.length < 4) {
                document.getElementById('senhaMsg').textContent = 'Senha deve ter pelo menos 4 caracteres.';
                document.getElementById('senhaMsg').style.color = '#f66';
                return;
            }

            if (nova !== conf) {
                document.getElementById('senhaMsg').textContent = 'As senhas não coincidem.';
                document.getElementById('senhaMsg').style.color = '#f66';
                return;
            }

            try {
                document.getElementById('senhaMsg').textContent = 'Alterando senha...';
                document.getElementById('senhaMsg').style.color = '#f5c842';

                const result = await callAPI('updatePassword', {
                    user: currentUser,
                    newPass: nova
                });

                if (result.success) {
                    alert('Senha alterada com sucesso!');
                    fecharModalSenha();
                } else {
                    document.getElementById('senhaMsg').textContent = 'Erro: ' + result.message;
                    document.getElementById('senhaMsg').style.color = '#f66';
                }
            } catch (error) {
                document.getElementById('senhaMsg').textContent = 'Erro de comunicação: ' + error.message;
                document.getElementById('senhaMsg').style.color = '#f66';
            }
        }

        // ============================================================
        // FUNÇÕES DE LOADING
        // ============================================================
        function showLoading(text) {
            const overlay = document.getElementById('loadingOverlay');
            const textEl = document.getElementById('loadingText');
            if (text) textEl.textContent = text;
            overlay.style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // ============================================================
        // IMAGE MODAL
        // ============================================================
        function openImageModal(src) {
            let modal = document.getElementById('imageModal');

            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'imageModal';
                modal.className = 'image-modal';

                modal.innerHTML = `
                        <img id="modalImage">
                    `;

                modal.onclick = function() {
                    modal.style.display = 'none';
                };

                document.body.appendChild(modal);
            }

            document.getElementById('modalImage').src = src;
            modal.style.display = 'flex';
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.querySelector('.cards-grid').style.display = 'flex';
        });

        window.addEventListener("load", () => {
            if (typeof html2canvas === "undefined") {
                console.warn("html2canvas não carregou.");
            }
            console.log('Função abrirFichaImagem disponível:', typeof abrirFichaImagem === 'function');
        });
    </script>
