<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SIGEC - Segurança Pública</title>
    <style>
        /* ===== RESET E BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 4px;
        }

        #app {
            max-width: 500px;
            width: 100%;
            min-height: 95vh;
            background: #2c2c2c;
            border-radius: 28px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            padding: 20px 18px 30px;
            transition: all 0.3s;
            border: 1px solid #3d3d3d;
            display: flex;
            flex-direction: column;
        }

        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 30px 0 20px;
        }

        #loginScreen h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #f5c842;
            text-shadow: 0 0 12px #f5c84255;
            border-bottom: 2px solid #f5c842;
            padding-bottom: 8px;
            width: 100%;
            text-align: center;
        }

        #loginScreen .sub {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: -12px;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 40px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .login-input:focus {
            border-color: #f5c842;
            box-shadow: 0 0 0 2px #f5c84233;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: #f5c842;
            color: #1a1a1a;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px #f5c84233;
        }

        .btn-login:active {
            transform: scale(0.96);
            background: #e0b032;
        }

        #dashboard {
            display: none;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .header-dash {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #3a3a3a;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 120px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: #f5c842;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.6rem;
            color: #1a1a1a;
            box-shadow: 0 0 0 2px #f5c84266;
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #eee;
            white-space: nowrap;
        }
        .logo-text span {
            color: #f5c842;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .btn-header {
            background: transparent;
            border: 1px solid #444;
            color: #ccc;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .btn-header:active {
            transform: scale(0.94);
        }
        .btn-header.sair {
            border-color: #b33;
            color: #f66;
        }

        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 4px 0;
            flex: 1;
            justify-content: center;
        }

        .card {
            background: #3b2b1a;
            border-radius: 24px;
            padding: 42px 30px;
            border: 2px solid #d4af37;
            box-shadow:
                0 0 3px #d4af37,
                0 0 8px #d4af37,
                0 0 12px #ffff00,
                0 0 18px #ccff00,
                0 0 25px rgba(204,255,0,0.7),
                0 4px 12px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            min-height: 280px;
        }

        .card:active {
            transform: scale(0.97);
            box-shadow:
                0 0 5px #d4af37,
                0 0 15px #ffff00,
                0 0 25px #ccff00,
                0 0 35px #99ff00;
        }

        .card h3 {
            font-size: 2rem;
            color: #f5e6c8;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card .badge {
            background: #f5c842;
            color: #1a1a1a;
            font-weight: 700;
            border-radius: 40px;
            font-size: 2rem;
            padding: 8px 24px;
        }

        .card .card-sub {
            font-size: 0.9rem;
            color: #b99f7a;
            margin-top: 10px;
            display: flex;
            gap: 12px;
        }

        .card.mandados {
            border: 2px solid #00ff66;
            box-shadow:
                0 0 4px #00ff66,
                0 0 10px #00ff66,
                0 0 16px #ffff00,
                0 0 24px #ffff00,
                0 0 32px #ff3300,
                0 0 42px #ff0000,
                0 4px 12px rgba(0,0,0,0.5);
            animation: neonMandado 2s infinite;
        }

        @keyframes neonMandado {
            0% {
                box-shadow:
                    0 0 4px #00ff66,
                    0 0 10px #00ff66,
                    0 0 16px #ffff00,
                    0 0 24px #ffff00,
                    0 0 32px #ff3300;
            }
            50% {
                box-shadow:
                    0 0 8px #00ff66,
                    0 0 18px #00ff66,
                    0 0 28px #ffff00,
                    0 0 38px #ff3300,
                    0 0 50px #ff0000;
            }
            100% {
                box-shadow:
                    0 0 4px #00ff66,
                    0 0 10px #00ff66,
                    0 0 16px #ffff00,
                    0 0 24px #ffff00,
                    0 0 32px #ff3300;
            }
        }

        .list-page {
            display: none;
            flex-direction: column;
            gap: 16px;
            height: 100%;
        }

        .detail-page {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .form-page {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .list-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #444;
        }

        .btn-back {
            background: none;
            border: none;
            color: #f5c842;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 0 6px;
        }

        .list-title {
            font-size: 1.3rem;
            font-weight: 600;
            flex: 1;
        }

        .list-item {
            background: #252525;
            border-radius: 16px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-left: 4px solid #f5c842;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .list-item .avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #3a3a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #f5c842;
            overflow: hidden;
            flex-shrink: 0;
        }

        .list-item .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .list-item .info {
            flex: 1;
        }
        .list-item .info .nome {
            font-weight: 600;
            font-size: 1rem;
        }
        .list-item .info .mae {
            font-size: 0.8rem;
            color: #aaa;
        }

        .list-item .seta {
            font-size: 1.8rem;
            color: #f5c842;
            cursor: pointer;
            padding: 0 6px;
        }

        .detail-card {
            background: #222;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #3d3d3d;
        }

        .detail-field {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #2e2e2e;
            font-size: 0.95rem;
        }
        .detail-field .label {
            color: #aaa;
        }
        .detail-field .value {
            font-weight: 500;
            text-align: right;
            max-width: 60%;
        }

        .detail-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
            justify-content: center;
        }

        .btn-detail {
            background: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: #eee;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1 0 auto;
            min-width: 80px;
            transition: 0.2s;
            border: 1px solid #555;
        }

        .btn-detail:active {
            transform: scale(0.95);
        }
        .btn-detail.editar {
            background: #f5c842;
            color: #1a1a1a;
            border-color: #f5c842;
        }
        .btn-detail.compartilhar {
            background: #25D366;
            color: #fff;
            border-color: #25D366;
        }
        .btn-detail.pdf {
            background: #c0392b;
            color: #fff;
            border-color: #c0392b;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 0.8rem;
            color: #aaa;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .form-group input, .form-group select {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #f5c842;
        }

        .form-group input:disabled {
            opacity: 0.5;
            background: #2a2a2a;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-form {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-form.salvar {
            background: #f5c842;
            color: #1a1a1a;
        }
        .btn-form.cancelar {
            background: #3d3d3d;
            color: #ccc;
        }

        .btn-form:active {
            transform: scale(0.95);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }

        .modal-box {
            background: #2c2c2c;
            border-radius: 28px;
            padding: 28px 24px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #f5c84255;
        }

        .modal-box h3 {
            margin-bottom: 16px;
            color: #f5c842;
        }

        .modal-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 14px;
        }

        .modal-box .btn-group {
            display: flex;
            gap: 12px;
        }

        .modal-box .btn-group button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
        }

        .modal-box .btn-group .alterar {
            background: #f5c842;
            color: #1a1a1a;
        }
        .modal-box .btn-group .cancelar-modal {
            background: #3d3d3d;
            color: #ccc;
        }

        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-8 { margin-top: 8px; }
        .mb-8 { margin-bottom: 8px; }
        .w-full { width: 100%; }

        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-upload-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-label {
            background: #333;
            padding: 12px 16px;
            border-radius: 12px;
            display: block;
            border: 1px solid #555;
            color: #ccc;
            text-align: center;
            cursor: pointer;
        }

        .scroll-area {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding-right: 4px;
        }
        .scroll-area::-webkit-scrollbar {
            width: 4px;
        }
        .scroll-area::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .scroll-area::-webkit-scrollbar-thumb {
            background: #f5c842;
            border-radius: 10px;
        }

        .detail-photo-header {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .detail-photo {
            width: 180px;
            height: 220px;
            object-fit: cover;
            border-radius: 14px;
            border: 2px solid #f5c842;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(245,200,66,0.4);
            transition: 0.2s;
        }

        .detail-photo:active {
            transform: scale(0.98);
        }

        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .image-modal img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 12px;
            border: 2px solid #f5c842;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #444;
            border-top-color: #f5c842;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #f5c842;
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            z-index: 99999;
            max-width: 90%;
            text-align: center;
            display: none;
            border: 1px solid #f5c84255;
        }

        @media (max-width: 480px) {
            #app {
                padding: 16px 14px 24px;
            }
            .header-dash {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .logo-area {
                justify-content: center;
            }
            .header-actions {
                justify-content: center;
                margin-left: 0;
            }
            .btn-header {
                font-size: 0.7rem;
                padding: 6px 12px;
                flex: 1;
                text-align: center;
                min-width: 60px;
            }
            .card {
                padding: 48px 32px;
                min-height: 320px;
            }
            .card h3 {
                font-size: 1.2rem;
            }
            .card .badge {
                font-size: 1rem;
                padding: 3px 14px;
                min-width: 30px;
            }
            .card .card-sub {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 380px) {
            .btn-header {
                font-size: 0.6rem;
                padding: 4px 8px;
                min-width: 50px;
            }
            .logo-text {
                font-size: 1.2rem;
            }
            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 1.3rem;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
    </script>
</head>
<body>
    <div id="app">
        <!-- TELA DE LOGIN -->
        <div id="loginScreen">
            <h1>⚔️ SIGEC</h1>
            <p class="sub">Sistema Integrado de Gestão e Controle</p>
            <input type="text" id="loginUser" class="login-input" placeholder="Usuário">
            <input type="password" id="loginPass" class="login-input" placeholder="Senha">
            <button class="btn-login" onclick="handleLogin()">🔐 ACESSAR</button>
            <p id="loginError" style="color:#f66; font-size:0.85rem; height:20px;"></p>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard">
            <div class="header-dash">
                <div class="logo-area">
                    <div class="logo-icon">⚔</div>
                    <div class="logo-text">SIG<span>EC</span></div>
                </div>
                <div class="header-actions">
                    <button class="btn-header" onclick="openCadastro()">CADASTRAR</button>
                    <button class="btn-header" onclick="openSenha()">SENHA</button>
                    <button class="btn-header sair" onclick="logout()">SAIR</button>
                </div>
            </div>

            <div class="cards-grid">
                <div class="card" id="cardAnotacoes" onclick="openList('NAO')">
                    <h3>
                        <span>📋 ANOTAÇÕES CRIMINAIS</span>
                        <span class="badge" id="badgeNao">0</span>
                    </h3>
                    <div class="card-sub"><span>Registros com MANDADO = NÃO</span></div>
                </div>
                <div class="card mandados" id="cardMandados" onclick="openList('SIM')">
                    <h3>
                        <span>⚖️ MANDADOS</span>
                        <span class="badge" id="badgeSim">0</span>
                    </h3>
                    <div class="card-sub"><span>Registros com MANDADO = SIM</span></div>
                </div>
            </div>

            <div id="dynamicContent" class="scroll-area"></div>
        </div>

        <!-- MODAL SENHA -->
        <div class="modal-overlay" id="modalSenha">
            <div class="modal-box">
                <h3>🔑 Alterar Senha</h3>
                <input type="password" id="novaSenhaInput" placeholder="Nova senha">
                <input type="password" id="confirmSenhaInput" placeholder="Confirmar senha">
                <p id="senhaMsg" style="color:#f5c842; font-size:0.85rem; margin:6px 0;"></p>
                <div class="btn-group">
                    <button class="alterar" onclick="alterarSenha()">ALTERAR</button>
                    <button class="cancelar-modal" onclick="fecharModalSenha()">CANCELAR</button>
                </div>
            </div>
        </div>

        <!-- LOADING -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">Gerando ficha...</div>
        </div>

        <!-- TOAST -->
        <div class="toast" id="toast"></div>
    </div>

    <script>
        // ============================================================
        // CONFIGURAÇÕES
        // ============================================================
        const API_URL =
            'https://script.google.com/macros/s/AKfycbw1U5fqEj8tYdCjx_KtuRrm3HBm1qmp5nksdr_PRTxd8ywMLWnX1VZ8vI99-t9oqGwH/exec';
        let currentUser = null;
        let allRecords = [];
        let currentView = 'dashboard';
        let currentListType = null;

        // ============================================================
        // TOAST NOTIFICATION
        // ============================================================
        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.style.display = 'none';
            }, duration);
        }

        function voltarDashboard() {
            document.getElementById('dynamicContent').innerHTML = '';
            document.querySelector('.cards-grid').style.display = 'flex';
            currentView = 'dashboard';
        }

        function formatarData(data) {
            if (!data || data === 'N/I' || data === '—') return 'N/I';
            if (typeof data === 'string' && (data.includes('GMT') || data.includes('T') || data.includes('-'))) {
                try {
                    const date = new Date(data);
                    if (!isNaN(date.getTime())) {
                        const dia = String(date.getDate()).padStart(2, '0');
                        const mes = String(date.getMonth() + 1).padStart(2, '0');
                        const ano = date.getFullYear();
                        return `${dia}/${mes}/${ano}`;
                    }
                } catch (e) { return data; }
            }
            if (typeof data === 'string' && /^\d{2}\/\d{2}\/\d{4}$/.test(data)) return data;
            try {
                const date = new Date(data);
                if (!isNaN(date.getTime())) {
                    const dia = String(date.getDate()).padStart(2, '0');
                    const mes = String(date.getMonth() + 1).padStart(2, '0');
                    const ano = date.getFullYear();
                    return `${dia}/${mes}/${ano}`;
                }
            } catch (e) {}
            return data;
        }

        // ============================================================
        // API - JSONP
        // ============================================================
        function callAPIGet(action, data = {}, callback) {
            const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            
            let url = API_URL + '?action=' + encodeURIComponent(action);
            url += '&callback=' + encodeURIComponent(callbackName);
            
            for (let key in data) {
                if (data[key] !== undefined && data[key] !== null) {
                    url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(
                        typeof data[key] === 'object' ? JSON.stringify(data[key]) : data[key]
                    );
                }
            }
            url += '&_nocache=' + Date.now();

            window[callbackName] = function(response) {
                try {
                    delete window[callbackName];
                    if (callback) callback(response);
                } catch (e) {
                    console.error('Erro no callback:', e);
                    if (callback) callback({ success: false, message: 'Erro ao processar resposta: ' + e.message });
                }
            };

            const script = document.createElement('script');
            script.src = url;
            script.onerror = function() {
                delete window[callbackName];
                if (callback) callback({ 
                    success: false, 
                    message: 'Erro na comunicação com o servidor. Verifique sua conexão e tente novamente.' 
                });
            };
            script.onload = function() {
                setTimeout(() => {
                    if (script.parentNode) script.parentNode.removeChild(script);
                }, 100);
            };
            document.body.appendChild(script);

            setTimeout(() => {
                if (window[callbackName]) {
                    delete window[callbackName];
                    if (callback) callback({ 
                        success: false, 
                        message: 'Tempo limite excedido. O servidor pode estar lento ou indisponível.' 
                    });
                }
            }, 30000);
        }

        function callAPIPost(action, data = {}) {
            return new Promise((resolve) => {
                const payload = { action: action, ...data };
                fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).then(() => {
                    resolve({ success: true, message: 'Operação realizada com sucesso!' });
                }).catch(error => {
                    console.error('Erro no POST:', error);
                    resolve({ success: false, message: 'Erro na comunicação: ' + error.message });
                });
            });
        }

        function callAPI(action, data = {}) {
            if (action === 'getRecords' || action === 'getLogin') {
                return new Promise((resolve) => {
                    callAPIGet(action, data, function(response) {
                        resolve(response);
                    });
                });
            } else {
                return callAPIPost(action, data);
            }
        }

        // ============================================================
        // RESIZE IMAGEM
        // ============================================================
        function resizeImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        let width = img.width,
                            height = img.height;
                        if (width > height) {
                            if (width > maxWidth) { height = Math.round(height * (maxWidth / width));
                                width = maxWidth; }
                        } else {
                            if (height > maxHeight) { width = Math.round(width * (maxHeight / height));
                                height = maxHeight; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality || 0.4));
                    };
                    img.onerror = function() { reject(new Error('Erro ao carregar imagem')); };
                    img.src = e.target.result;
                };
                reader.onerror = function() { reject(new Error('Erro ao ler arquivo')); };
                reader.readAsDataURL(file);
            });
        }

            if (!user || !pass) {
                document.getElementById('loginError').textContent = 'Preencha usuário e senha.';

                if (result.success) {
                    const found = result.users.find(u => u.usuario === user && u.senha === pass && u.ativo === 'SIM');
                    if (found) {
                        currentUser = user;
                        document.getElementById('loginScreen').style.display = 'none';

                        await loadRecords();
                        showDashboardContent();

        async function alterarSenha() {
            const nova = document.getElementById('novaSenhaInput').value.trim();
            const conf = document.getElementById('confirmSenhaInput').value.trim();
            if (!nova || nova.length < 4) {
                document.getElementById('senhaMsg').textContent = 'Senha deve ter pelo menos 4 caracteres.';
                document.getElementById('senhaMsg').style.color = '#f66';
                return;
            }
            if (nova !== conf) {
                document.getElementById('senhaMsg').textContent = 'As senhas não coincidem.';
                document.getElementById('senhaMsg').style.color = '#f66';
                return;
            }
            try {
                document.getElementById('senhaMsg').textContent = 'Alterando senha...';
                document.getElementById('senhaMsg').style.color = '#f5c842';
                const result = await callAPI('updatePassword', { user: currentUser, newPass: nova });
                if (result.success) {
                    alert('Senha alterada com sucesso!');
                    fecharModalSenha();
                } else {
                    document.getElementById('senhaMsg').textContent = 'Erro: ' + result.message;
                    document.getElementById('senhaMsg').style.color = '#f66';
                }
            } catch (error) {
                document.getElementById('senhaMsg').textContent = 'Erro de comunicação: ' + error.message;
                document.getElementById('senhaMsg').style.color = '#f66';
            }
        }

        // ============================================================
        // LOADING
        // ============================================================
        function showLoading(text) {
            const overlay = document.getElementById('loadingOverlay');
            const textEl = document.getElementById('loadingText');
            if (text) textEl.textContent = text;
            overlay.style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // ============================================================
        // ENVIAR PARA WHATSAPP - FUNÇÃO PRINCIPAL
        // ============================================================
        function enviarParaWhatsApp(dataUrl, nomeArquivo) {
            return new Promise((resolve, reject) => {
                try {
                    // Verifica se o navegador suporta Web Share API
                    if (navigator.share) {
                        // Converte dataUrl para Blob
                        fetch(dataUrl)
                            .then(res => res.blob())
                            .then(blob => {
                                const file = new File([blob], nomeArquivo, { type: 'image/jpeg' });
                                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                                    navigator.share({
                                        title: 'SIGEC - Ficha Criminal',
                                        text: 'Ficha criminal do sistema SIGEC',
                                        files: [file]
                                    })
                                    .then(() => resolve())
                                    .catch(err => {
                                        if (err.name !== 'AbortError') {
                                            reject(err);
                                        } else {
                                            resolve();
                                        }
                                    });
                                } else {
                                    reject(new Error('Compartilhamento de arquivos não suportado'));
                                }
                            })
                            .catch(err => reject(err));
                    } else {
                        // Fallback: tenta abrir o WhatsApp com a imagem
                        // Para Android, podemos usar o intent do WhatsApp
                        const linkWhatsApp = document.createElement('a');
                        linkWhatsApp.href = `whatsapp://send?text=*SIGEC - Ficha Criminal*%0A%0A${encodeURIComponent('Ficha gerada pelo sistema SIGEC.')}`;
                        linkWhatsApp.target = '_blank';
                        
                        // Tenta abrir o WhatsApp
                        const resultado = window.open(linkWhatsApp.href, '_blank');
                        if (!resultado || resultado.closed) {
                            // Se não abrir, tenta o link da web
                            const linkWeb = document.createElement('a');
                            linkWeb.href = `https://wa.me/?text=${encodeURIComponent('*SIGEC - Ficha Criminal*%0A%0AFicha gerada pelo sistema SIGEC.')}`;
                            linkWeb.target = '_blank';
                            linkWeb.click();
                        }
                        
                        // Baixa a imagem para o usuário
                        const a = document.createElement('a');
                        a.href = dataUrl;
                        a.download = nomeArquivo;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        
                        showToast('📱 Abrindo WhatsApp... A imagem foi baixada para enviar.', 4000);
                        resolve();
                    }
                } catch (error) {
                    reject(error);
                }
            });
        }

        // ============================================================
        // GERAR FICHA IMAGEM (CORRIGIDO PARA ENVIAR DIRETO AO WHATSAPP)
        // ============================================================
        function abrirFichaImagem(id) {
            const rec = allRecords.find(r => r.ID == id);
            if (!rec) { alert("Registro não encontrado"); return; }

            const dataNasc = formatarData(rec.DATA_NASC);
            const mandadoStatus = (rec.MANDADO || '').toUpperCase() === 'SIM' ? 'CONSTA MANDADO DE PRISÃO' :
                'NÃO CONSTA MANDADO DE PRISÃO';

            const filiacao = [];
            if (rec.MAE) filiacao.push(`MÃE: ${rec.MAE}`);
            if (rec.PAI) filiacao.push(`PAI: ${rec.PAI}`);
            if (filiacao.length === 0) filiacao.push('MÃE: –', 'PAI: –');
            const ufRg = rec.UF_RG || '';

            // Remove visualizador anterior se existir
            const visualizadorAntigo = document.getElementById('visualizadorFicha');
            if (visualizadorAntigo) {
                visualizadorAntigo.parentNode.removeChild(visualizadorAntigo);
            }

            // Cria um visualizador flutuante
            const visualizador = document.createElement('div');
            visualizador.id = 'visualizadorFicha';
            visualizador.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.92);
                z-index: 9998;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 16px;
                overflow-y: auto;
            `;

            // Conteúdo da ficha
            const divFicha = document.createElement('div');
            divFicha.id = 'fichaImagemGerada';
            divFicha.style.cssText = `
                width: 100%;
                max-width: 480px;
                background: #ffffff;
                padding: 20px 16px;
                color: #1a1a1a;
                font-family: 'Segoe UI', Arial, sans-serif;
                border: 4px double #0b2a57;
                border-radius: 18px;
                box-sizing: border-box;
                line-height: 1.4;
                margin-bottom: 16px;
                flex-shrink: 0;
            `;

            let htmlFicha = `
                <div style="background:#08264f;color:#fff;text-align:center;padding:14px;border-radius:12px 12px 0 0;margin:-20px -16px 16px -16px;">
                    <div style="font-size:32px;font-weight:900;letter-spacing:3px;">SIGEC</div>
                    <div style="font-size:13px;font-weight:600;">SISTEMA INTEGRADO DE GESTÃO E CONTROLE</div>
                </div>
                <div style="text-align:center;margin-bottom:12px;">
                    <div style="font-size:17px;font-weight:900;color:#111;">REGISTRO DE ANOTAÇÕES CRIMINAIS</div>
                    <div style="font-size:15px;font-weight:800;color:#c62828;margin-top:4px;">${mandadoStatus}</div>
                </div>
                <div style="display:flex;flex-direction:column;gap:12px;">
                    <div style="text-align:center;">
            `;
            if (rec.FOTO) {
                htmlFicha += `
                    <img src="${rec.FOTO}" style="width:100px;height:130px;object-fit:cover;border:3px solid #0b2a57;border-radius:12px;">
                `;
            }
            htmlFicha += `
                        <div style="margin-top:6px;font-size:13px;font-weight:900;">ID</div>
                        <div style="font-size:36px;font-weight:900;">${rec.ID}</div>
                    </div>
                    <div>
            `;

            const fields = [
                ['NOME', rec.NOME || '—'],
                ['ALCUNHA', rec.ALCUNHA || '–'],
                ['FILIAÇÃO', filiacao.join('<br>')],
                ['DATA NASC.', dataNasc],
                ['CPF', rec.CPF || '—'],
                ['RG', (rec.RG || '—') + (ufRg ? ` SSP ${ufRg}` : '')],
                ['ENDEREÇO', rec.ENDERECO || '—'],
                ['CIDADE', rec.CIDADE || '—'],
                ['UF', rec.UF || rec.ESTADO || '—'],
                ['TIPO PENAL', rec.TIPO_PENAL || '–'],
                ['MANDADO', rec.MANDADO || '—']
            ];

            fields.forEach(([label, val]) => {
                htmlFicha += `
                    <div style="display:flex;border-bottom:1px solid #cfd8dc;padding:6px 0;font-size:12px;">
                        <div style="width:90px;font-weight:800;color:#0b2a57;flex-shrink:0;">${label}</div>
                        <div style="flex:1;word-break:break-word;">${val}</div>
                    </div>
                `;
            });

            htmlFicha += `
                    </div>
                </div>
                <div style="background:#08264f;color:#fff;margin:16px -16px -20px -16px;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;font-size:9px;border-radius:0 0 12px 12px;flex-wrap:wrap;gap:4px;">
                    <div>SIGEC - SISTEMA INTEGRADO DE GESTÃO E CONTROLE<br>USO EXCLUSIVO DAS FORÇAS DE SEGURANÇA</div>
                    <div>${new Date().toLocaleString('pt-BR')}</div>
                </div>
            `;
            divFicha.innerHTML = htmlFicha;

            // Botões
            const btnContainer = document.createElement('div');
            btnContainer.style.cssText = `
                display: flex;
                gap: 10px;
                width: 100%;
                max-width: 480px;
                flex-wrap: wrap;
                flex-shrink: 0;
            `;

            const btnEnviar = document.createElement('button');
            btnEnviar.textContent = '📤 ENVIAR WHATSAPP';
            btnEnviar.style.cssText = `
                flex: 1;
                padding: 14px 20px;
                background: #25D366;
                border: none;
                border-radius: 12px;
                color: #fff;
                font-weight: 700;
                font-size: 1rem;
                cursor: pointer;
                min-width: 120px;
                touch-action: manipulation;
                -webkit-tap-highlight-color: transparent;
            `;
            btnEnviar.onclick = function() {
                const elemento = document.getElementById('fichaImagemGerada');
                if (!elemento) { 
                    alert('Erro ao gerar ficha.');
                    return; 
                }

                showLoading("Gerando ficha...");

                // Força o reflow para garantir que o elemento está renderizado
                elemento.offsetHeight;

                html2canvas(elemento, {
                    scale: 2.5,
                    useCORS: true,
                    backgroundColor: "#ffffff",
                    logging: false,
                    width: elemento.scrollWidth,
                    height: elemento.scrollHeight,
                    windowWidth: elemento.scrollWidth,
                    windowHeight: elemento.scrollHeight,
                    onclone: function(doc) {
                        const imgs = doc.querySelectorAll('img');
                        return Promise.all(Array.from(imgs).map(img => {
                            if (img.complete) return Promise.resolve();
                            return new Promise((resolve) => {
                                img.onload = resolve;
                                img.onerror = resolve;
                            });
                        }));
                    }
                }).then(canvas => {
                    hideLoading();
                    
                    // Converte para dataUrl
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                    const nomeArquivo = `Ficha_SIGEC_${(rec.NOME || rec.ID).replace(/\s+/g, '_')}.jpg`;
                    
                    // Tenta enviar para o WhatsApp
                    enviarParaWhatsApp(dataUrl, nomeArquivo)
                        .then(() => {
                            showToast('✅ Ficha enviada com sucesso!', 3000);
                        })
                        .catch(err => {
                            console.error('Erro ao enviar:', err);
                            // Fallback: baixa a imagem
                            const a = document.createElement('a');
                            a.href = dataUrl;
                            a.download = nomeArquivo;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            showToast('📥 Ficha baixada. Compartilhe manualmente.', 4000);
                        });
                    
                }).catch(err => {
                    hideLoading();
                    console.error('Erro ao gerar ficha:', err);
                    alert('Erro ao gerar a ficha: ' + err.message);
                });
            };

            const btnFechar = document.createElement('button');
            btnFechar.textContent = '✕ FECHAR';
            btnFechar.style.cssText = `
                flex: 1;
                padding: 14px 20px;
                background: #c0392b;
                border: none;
                border-radius: 12px;
                color: #fff;
                font-weight: 700;
                font-size: 1rem;
                cursor: pointer;
                min-width: 120px;
                touch-action: manipulation;
                -webkit-tap-highlight-color: transparent;
            `;
            btnFechar.onclick = function() {
                if (visualizador.parentNode) {
                    visualizador.parentNode.removeChild(visualizador);
                }
                const fichaEl = document.getElementById('fichaImagemGerada');
                if (fichaEl && fichaEl.parentNode && fichaEl.parentNode !== visualizador) {
                    fichaEl.parentNode.removeChild(fichaEl);
                }
            };

            btnContainer.appendChild(btnEnviar);
            btnContainer.appendChild(btnFechar);

            visualizador.appendChild(divFicha);
            visualizador.appendChild(btnContainer);
            document.body.appendChild(visualizador);

            // Adiciona scroll suave para mobile
            visualizador.addEventListener('touchmove', function(e) {
                e.stopPropagation();
            }, { passive: true });
        }

        // ============================================================
        // IMAGE MODAL
        // ============================================================
        function openImageModal(src) {
            let modal = document.getElementById('imageModal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'imageModal';
                modal.className = 'image-modal';
                modal.innerHTML = `<img id="modalImage">`;
                modal.onclick = function() { modal.style.display = 'none'; };
                document.body.appendChild(modal);
            }
            document.getElementById('modalImage').src = src;
            modal.style.display = 'flex';
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.querySelector('.cards-grid').style.display = 'flex';
        });

        window.addEventListener("load", () => {
            if (typeof html2canvas === "undefined") {
                console.warn("html2canvas não carregou.");
            }
            console.log('Função abrirFichaImagem disponível:', typeof abrirFichaImagem === 'function');
        });
    </script>
