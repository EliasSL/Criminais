<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SIGEC - Segurança Pública</title>
    <style>
        /* ===== RESET E BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 4px;
        }

        /* ===== CONTAINER PRINCIPAL ===== */
        #app {
            max-width: 500px;
            width: 100%;
            min-height: 95vh;
            background: #2c2c2c;
            border-radius: 28px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            padding: 20px 18px 30px;
            transition: all 0.3s;
            border: 1px solid #3d3d3d;
            display: flex;
            flex-direction: column;
        }

        /* ===== TELA DE LOGIN ===== */
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 30px 0 20px;
        }

        #loginScreen h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #f5c842;
            text-shadow: 0 0 12px #f5c84255;
            border-bottom: 2px solid #f5c842;
            padding-bottom: 8px;
            width: 100%;
            text-align: center;
        }

        #loginScreen .sub {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: -12px;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 40px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .login-input:focus {
            border-color: #f5c842;
            box-shadow: 0 0 0 2px #f5c84233;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: #f5c842;
            color: #1a1a1a;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px #f5c84233;
        }

        .btn-login:active {
            transform: scale(0.96);
            background: #e0b032;
        }

        /* ===== HEADER / DASHBOARD ===== */
        #dashboard {
            display: none;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .header-dash {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #3a3a3a;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 120px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: #f5c842;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.6rem;
            color: #1a1a1a;
            box-shadow: 0 0 0 2px #f5c84266;
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #eee;
            white-space: nowrap;
        }
        .logo-text span {
            color: #f5c842;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .btn-header {
            background: transparent;
            border: 1px solid #444;
            color: #ccc;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .btn-header:active {
            transform: scale(0.94);
        }
        .btn-header.sair {
            border-color: #b33;
            color: #f66;
        }

        /* ===== CARDS ===== */
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 4px 0;
            flex: 1;
            justify-content: center;
        }

        .card {
            background: #3b2b1a;
            border-radius: 24px;
            padding: 42px 30px;
            border: 2px solid #d4af37;
            box-shadow: 0 0 3px #d4af37, 0 0 8px #d4af37, 0 0 12px #ffff00, 0 0 18px #ccff00, 0 0 25px rgba(204,255,0,0.7), 0 4px 12px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            min-height: 280px;
        }

        .card:active {
            transform: scale(0.97);
            box-shadow: 0 0 5px #d4af37, 0 0 15px #ffff00, 0 0 25px #ccff00, 0 0 35px #99ff00;
        }

        .card h3 {
            font-size: 2rem;
            color: #f5e6c8;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card .badge {
            background: #f5c842;
            color: #1a1a1a;
            font-weight: 700;
            border-radius: 40px;
            font-size: 2rem;
            padding: 8px 24px;
        }

        .card .card-sub {
            font-size: 0.9rem;
            color: #b99f7a;
            margin-top: 10px;
            display: flex;
            gap: 12px;
        }

        .card.mandados {
            border: 2px solid #00ff66;
            box-shadow: 0 0 4px #00ff66, 0 0 10px #00ff66, 0 0 16px #ffff00, 0 0 24px #ffff00, 0 0 32px #ff3300, 0 0 42px #ff0000, 0 4px 12px rgba(0,0,0,0.5);
            animation: neonMandado 2s infinite;
        }

        @keyframes neonMandado {
            0% {
                box-shadow: 0 0 4px #00ff66, 0 0 10px #00ff66, 0 0 16px #ffff00, 0 0 24px #ffff00, 0 0 32px #ff3300;
            }
            50% {
                box-shadow: 0 0 8px #00ff66, 0 0 18px #00ff66, 0 0 28px #ffff00, 0 0 38px #ff3300, 0 0 50px #ff0000;
            }
            100% {
                box-shadow: 0 0 4px #00ff66, 0 0 10px #00ff66, 0 0 16px #ffff00, 0 0 24px #ffff00, 0 0 32px #ff3300;
            }
        }

        /* ===== PÁGINAS DE LISTA ===== */
        .list-page {
            display: none;
            flex-direction: column;
            gap: 16px;
            height: 100%;
        }

        .detail-page {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .form-page {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .list-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #444;
        }

        .btn-back {
            background: none;
            border: none;
            color: #f5c842;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 0 6px;
        }

        .list-title {
            font-size: 1.3rem;
            font-weight: 600;
            flex: 1;
        }

        .list-item {
            background: #252525;
            border-radius: 16px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-left: 4px solid #f5c842;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .list-item .avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #3a3a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #f5c842;
            overflow: hidden;
            flex-shrink: 0;
        }

        .list-item .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .list-item .info {
            flex: 1;
        }
        .list-item .info .nome {
            font-weight: 600;
            font-size: 1rem;
        }
        .list-item .info .mae {
            font-size: 0.8rem;
            color: #aaa;
        }

        .list-item .seta {
            font-size: 1.8rem;
            color: #f5c842;
            cursor: pointer;
            padding: 0 6px;
        }

        /* ===== DETALHES ===== */
        .detail-card {
            background: #222;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #3d3d3d;
        }

        .detail-field {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #2e2e2e;
            font-size: 0.95rem;
        }
        .detail-field .label {
            color: #aaa;
        }
        .detail-field .value {
            font-weight: 500;
            text-align: right;
            max-width: 60%;
        }

        .detail-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
            justify-content: center;
        }

        .btn-detail {
            background: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: #eee;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1 0 auto;
            min-width: 80px;
            transition: 0.2s;
            border: 1px solid #555;
        }

        .btn-detail:active {
            transform: scale(0.95);
        }
        .btn-detail.editar {
            background: #f5c842;
            color: #1a1a1a;
            border-color: #f5c842;
        }
        .btn-detail.compartilhar {
            background: #25D366;
            color: #fff;
            border-color: #25D366;
        }
        .btn-detail.pdf {
            background: #c0392b;
            color: #fff;
            border-color: #c0392b;
        }

        /* ===== FORMULÁRIO ===== */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 0.8rem;
            color: #aaa;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .form-group input, .form-group select {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #f5c842;
        }

        .form-group input:disabled {
            opacity: 0.5;
            background: #2a2a2a;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-form {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-form.salvar {
            background: #f5c842;
            color: #1a1a1a;
        }
        .btn-form.cancelar {
            background: #3d3d3d;
            color: #ccc;
        }

        .btn-form:active {
            transform: scale(0.95);
        }

        /* ===== SENHA ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }

        .modal-box {
            background: #2c2c2c;
            border-radius: 28px;
            padding: 28px 24px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #f5c84255;
        }

        .modal-box h3 {
            margin-bottom: 16px;
            color: #f5c842;
        }

        .modal-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 14px;
        }

        .modal-box .btn-group {
            display: flex;
            gap: 12px;
        }

        .modal-box .btn-group button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
        }

        .modal-box .btn-group .alterar {
            background: #f5c842;
            color: #1a1a1a;
        }
        .modal-box .btn-group .cancelar-modal {
            background: #3d3d3d;
            color: #ccc;
        }

        /* ===== UTILITÁRIOS ===== */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-8 { margin-top: 8px; }
        .mb-8 { margin-bottom: 8px; }
        .w-full { width: 100%; }

        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-upload-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-label {
            background: #333;
            padding: 12px 16px;
            border-radius: 12px;
            display: block;
            border: 1px solid #555;
            color: #ccc;
            text-align: center;
            cursor: pointer;
        }

        /* ===== SCROLL ===== */
        .scroll-area {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding-right: 4px;
        }
        .scroll-area::-webkit-scrollbar {
            width: 4px;
        }
        .scroll-area::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .scroll-area::-webkit-scrollbar-thumb {
            background: #f5c842;
            border-radius: 10px;
        }

        /* ===== FOTO DETALHAMENTO ===== */
        .detail-photo-header {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .detail-photo {
            width: 180px;
            height: 220px;
            object-fit: cover;
            border-radius: 14px;
            border: 2px solid #f5c842;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(245,200,66,0.4);
            transition: 0.2s;
        }

        .detail-photo:active {
            transform: scale(0.98);
        }

        /* Modal da imagem */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .image-modal img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 12px;
            border: 2px solid #f5c842;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 480px) {
            #app {
                padding: 16px 14px 24px;
            }

            .header-dash {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }

            .logo-area {
                justify-content: center;
            }

            .header-actions {
                justify-content: center;
                margin-left: 0;
            }

            .btn-header {
                font-size: 0.7rem;
                padding: 6px 12px;
                flex: 1;
                text-align: center;
                min-width: 60px;
            }

            .card {
                padding: 48px 32px;
                min-height: 320px;
                animation: inherit;
            }

            .card h3 {
                font-size: 1.2rem;
            }

            .card .badge {
                font-size: 1rem;
                padding: 3px 14px;
                min-width: 30px;
            }

            .card .card-sub {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 380px) {
            .btn-header {
                font-size: 0.6rem;
                padding: 4px 8px;
                min-width: 50px;
            }

            .logo-text {
                font-size: 1.2rem;
            }

            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- ========== TELA DE LOGIN ========== -->
    <div id="loginScreen">
        <h1>⚔️ SIGEC</h1>
        <p class="sub">Sistema Integrado de Gestão e Controle</p>
        <input type="text" id="loginUser" class="login-input" placeholder="Usuário">
        <input type="password" id="loginPass" class="login-input" placeholder="Senha">
        <button class="btn-login" onclick="handleLogin()">🔐 ACESSAR</button>
        <p id="loginError" style="color:#f66; font-size:0.85rem; height:20px;"></p>
    </div>

    <!-- ========== DASHBOARD ========== -->
    <div id="dashboard">
        <!-- HEADER -->
        <div class="header-dash">
            <div class="logo-area">
                <div class="logo-icon">⚔</div>
                <div class="logo-text">SIG<span>EC</span></div>
            </div>
            <div class="header-actions">
                <button class="btn-header" onclick="openCadastro()">CADASTRAR</button>
                <button class="btn-header" onclick="openSenha()">SENHA</button>
                <button class="btn-header sair" onclick="logout()">SAIR</button>
            </div>
        </div>

        <!-- CARDS -->
        <div class="cards-grid">
            <div class="card" id="cardAnotacoes" onclick="openList('NAO')">
                <h3>
                    <span>📋 ANOTAÇÕES CRIMINAIS</span>
                    <span class="badge" id="badgeNao">0</span>
                </h3>
                <div class="card-sub"><span>Registros com MANDADO = NÃO</span></div>
            </div>
            <div class="card mandados" id="cardMandados" onclick="openList('SIM')">
                <h3>
                    <span>⚖️ MANDADOS</span>
                    <span class="badge" id="badgeSim">0</span>
                </h3>
                <div class="card-sub"><span>Registros com MANDADO = SIM</span></div>
            </div>
        </div>

        <!-- ÁREA DE CONTEÚDO DINÂMICO (listas, detalhes, formulário) -->
        <div id="dynamicContent" class="scroll-area">
            <!-- Aqui será injetado o conteúdo via JS -->
        </div>
    </div>

    <!-- ========== MODAL SENHA ========== -->
    <div class="modal-overlay" id="modalSenha">
        <div class="modal-box">
            <h3>🔑 Alterar Senha</h3>
            <input type="password" id="novaSenhaInput" placeholder="Nova senha">
            <input type="password" id="confirmSenhaInput" placeholder="Confirmar senha">
            <p id="senhaMsg" style="color:#f5c842; font-size:0.85rem; margin:6px 0;"></p>
            <div class="btn-group">
                <button class="alterar" onclick="alterarSenha()">ALTERAR</button>
                <button class="cancelar-modal" onclick="fecharModalSenha()">CANCELAR</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURAÇÕES GLOBAIS
    // ============================================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbw1U5fqEj8tYdCjx_KtuRrm3HBm1qmp5nksdr_PRTxd8ywMLWnX1VZ8vI99-t9oqGwH/exec';
    let currentUser = null;
    let allRecords = [];
    let currentView = 'dashboard';
    let currentListType = null;

    // ============================================================
    // FUNÇÕES DE API - USANDO JSONP PARA GET E POST VIA JSON
    // ============================================================
    
    // Função para requisições GET (JSONP)
    function callAPIGet(action, data = {}, callback) {
        const callbackName = 'jsonp_' + action + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        
        let url = API_URL + '?action=' + encodeURIComponent(action) + '&callback=' + encodeURIComponent(callbackName);
        
        for (let key in data) {
            if (data[key] !== undefined && data[key] !== null) {
                if (typeof data[key] === 'object') {
                    url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(JSON.stringify(data[key]));
                } else {
                    url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(data[key]);
                }
            }
        }
        
        window[callbackName] = function(response) {
            delete window[callbackName];
            if (callback) callback(response);
        };
        
        const script = document.createElement('script');
        script.src = url + '&_nocache=' + Date.now();
        script.onerror = function() {
            delete window[callbackName];
            if (callback) callback({ success: false, message: 'Erro na comunicação com o servidor.' });
        };
        document.body.appendChild(script);
    }

    // Função para requisições POST via JSON (CORRIGIDA)
    function callAPIPost(action, data = {}) {
        return new Promise((resolve, reject) => {
            // Constrói o payload como JSON
            const payload = {
                action: action,
                ...data
            };
            
            // Configura a requisição POST
            const options = {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            };
            
            fetch(API_URL, options)
                .then(response => {
                    // Com no-cors, não podemos ler a resposta diretamente
                    // Vamos assumir que a operação foi bem-sucedida se não houve erro
                    resolve({ success: true, message: 'Operação realizada com sucesso!' });
                })
                .catch(error => {
                    console.error('Erro no POST:', error);
                    resolve({ success: false, message: 'Erro na comunicação: ' + error.message });
                });
        });
    }

    // Função unificada para chamar a API
    function callAPI(action, data = {}) {
        // GET para leitura
        if (action === 'getRecords' || action === 'getLogin') {
            return new Promise((resolve) => {
                callAPIGet(action, data, function(response) {
                    resolve(response);
                });
            });
        }
        // POST para escrita
        else {
            return callAPIPost(action, data);
        }
    }

    // ============================================================
    // FUNÇÃO PARA REDIMENSIONAR IMAGEM
    // ============================================================
    function resizeImage(file, maxWidth, maxHeight, quality) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > maxWidth) {
                            height = Math.round(height * (maxWidth / width));
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width = Math.round(width * (maxHeight / height));
                            height = maxHeight;
                        }
                    }
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', quality || 0.4);
                    resolve(dataUrl);
                };
                img.onerror = function() {
                    reject(new Error('Erro ao carregar imagem'));
                };
                img.src = e.target.result;
            };
            reader.onerror = function() {
                reject(new Error('Erro ao ler arquivo'));
            };
            reader.readAsDataURL(file);
        });
    }

    // ============================================================
    async function loadRecords() {
        try {
            const result = await callAPI('getRecords');
            if (result.success) {
                allRecords = result.records || [];
                updateBadges();
                return allRecords;
            } else {
                alert('Erro ao carregar dados: ' + result.message);
                return [];
            }
        } catch (e) {
            console.error('Erro ao carregar registros:', e);
            alert('Erro de comunicação ao carregar dados.');
            return [];
        }
    }

    function updateBadges() {
        const nao = allRecords.filter(r => (r.MANDADO || '')
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g,'')
            .toUpperCase() === 'NAO').length;
        const sim = allRecords.filter(r => (r.MANDADO || '').toUpperCase() === 'SIM').length;
        document.getElementById('badgeNao').textContent = nao;
        document.getElementById('badgeSim').textContent = sim;
    }

    // ============================================================
    // LOGIN
    // ============================================================
    async function handleLogin() {
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        if (!user || !pass) {
            document.getElementById('loginError').textContent = 'Preencha usuário e senha.';
            return;
        }
        
        try {
            const result = await callAPI('getLogin');
            if (result.success) {
                const found = result.users.find(u => u.usuario === user && u.senha === pass && u.ativo === 'SIM');
                if (found) {
                    currentUser = user;
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'flex';
                    await loadRecords();
                    showDashboardContent();
                } else {
                    document.getElementById('loginError').textContent = 'Usuário ou senha inválidos.';
                }
            } else {
                document.getElementById('loginError').textContent = 'Erro ao validar login.';
            }
        } catch (e) {
            document.getElementById('loginError').textContent = 'Erro de comunicação.';
        }
    }

    function openList(tipo) {
        document.querySelector('.cards-grid').style.display = 'none';

        const filtered = allRecords.filter(r => {
            const mandado = (r.MANDADO || '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g,'')
                .toUpperCase();

            const busca = tipo
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g,'')
                .toUpperCase();

            return mandado === busca;
        });
        currentListType = tipo;
        if (filtered.length === 0) {
            alert('Nenhum registro com MANDADO = ' + tipo);
            backToDashboard();
            return;
        }
        const title = tipo === 'SIM' ? 'MANDADOS' : 'ANOTAÇÕES CRIMINAIS';
        let html = `
            <div class="list-page" style="display:flex; flex-direction:column; height:100%;">
                <div class="list-header">

                .join(' ')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g,'')
                .toUpperCase();

            const imgHtml = foto ? `<img src="${foto}" alt="foto" style="width:100%;height:100%;object-fit:cover;">` : '📷';
            html += `
                <div class="list-item" data-search="${searchable}">

        html += `</div></div>`;

        document.getElementById('dynamicContent').scrollTop = 0;

    async function alterarSenha() {
        const nova = document.getElementById('novaSenhaInput').value.trim();
        const conf = document.getElementById('confirmSenhaInput').value.trim();
        
        if (!nova || nova.length < 4) {
            document.getElementById('senhaMsg').textContent = 'Senha deve ter pelo menos 4 caracteres.';
            document.getElementById('senhaMsg').style.color = '#f66';
            return;
        }
        
        if (nova !== conf) {
            document.getElementById('senhaMsg').textContent = 'As senhas não coincidem.';
            document.getElementById('senhaMsg').style.color = '#f66';
            return;
        }
        
        try {
            document.getElementById('senhaMsg').textContent = 'Alterando senha...';
            document.getElementById('senhaMsg').style.color = '#f5c842';
            
            const result = await callAPI('updatePassword', {
                user: currentUser,
                newPass: nova
            });
            
            if (result.success) {
                alert('Senha alterada com sucesso!');
                fecharModalSenha();
            } else {
                document.getElementById('senhaMsg').textContent = 'Erro: ' + result.message;
                document.getElementById('senhaMsg').style.color = '#f66';
            }
        } catch (error) {
            document.getElementById('senhaMsg').textContent = 'Erro de comunicação: ' + error.message;
            document.getElementById('senhaMsg').style.color = '#f66';
        }
    }

        mensagem += '🆔 RG: ' + (rec.RG || 'N/I') + ' - ' + (rec.UF_RG || 'N/I') + '\n';
        mensagem += '📱 Telefone: ' + (rec.TELEFONE || 'N/I') + '\n';
        mensagem += '🏠 Endereço: ' + (rec.ENDERECO || 'N/I') + '\n';
        mensagem += '🏙️ Cidade: ' + (rec.CIDADE || 'N/I') + ' - ' + (rec.ESTADO || 'N/I') + '\n';
        mensagem += '⚖️ Tipo Penal: ' + (rec.TIPO_PENAL || 'N/I') + '\n';
        mensagem += '📋 Mandado: ' + (rec.MANDADO || 'N/I') + '\n';
        
        // URL do WhatsApp com a mensagem
        const url = 'https://api.whatsapp.com/send?text=' + encodeURIComponent(mensagem);
        
        // Abrir WhatsApp (funciona no celular e desktop)
        window.open(url, '_blank');
    }

    // ============================================================
    // PDF (CORRIGIDO PARA GERAR E ABRIR NO CELULAR)
    // ============================================================
    function gerarPDF(id) {
        const rec = allRecords.find(r => r.ID == id);
        if (!rec) return;
        
        // Construir o conteúdo do PDF (simples)
        let conteudo = '====================================\n';
        conteudo += '        SIGEC - SISTEMA DE GESTÃO\n';
        conteudo += '====================================\n\n';
        conteudo += 'RELATÓRIO DE REGISTRO #' + rec.ID + '\n';
        conteudo += '------------------------------------\n';
        conteudo += 'NOME: ' + (rec.NOME || 'N/I') + '\n';
        conteudo += 'ALCUNHA: ' + (rec.ALCUNHA || 'N/I') + '\n';
        conteudo += 'MÃE: ' + (rec.MAE || 'N/I') + '\n';
        conteudo += 'PAI: ' + (rec.PAI || 'N/I') + '\n';
        conteudo += 'DATA NASC.: ' + (rec.DATA_NASC || 'N/I') + '\n';
        conteudo += 'NATURALIDADE: ' + (rec.NATURALIDADE || 'N/I') + ' - ' + (rec.UF_NAT || 'N/I') + '\n';
        conteudo += 'CPF: ' + (rec.CPF || 'N/I') + '\n';
        conteudo += 'RG: ' + (rec.RG || 'N/I') + ' - ' + (rec.UF_RG || 'N/I') + '\n';
        conteudo += 'TELEFONE: ' + (rec.TELEFONE || 'N/I') + '\n';
        conteudo += 'ENDEREÇO: ' + (rec.ENDERECO || 'N/I') + '\n';
        conteudo += 'CIDADE: ' + (rec.CIDADE || 'N/I') + ' - ' + (rec.ESTADO || 'N/I') + '\n';
        conteudo += 'TIPO PENAL: ' + (rec.TIPO_PENAL || 'N/I') + '\n';
        conteudo += 'MANDADO: ' + (rec.MANDADO || 'N/I') + '\n';
        conteudo += '====================================\n';
        conteudo += 'Gerado em: ' + new Date().toLocaleString() + '\n';
        conteudo += '====================================\n';
        
        // Criar um Blob com o conteúdo
        const blob = new Blob([conteudo], { type: 'text/plain;charset=utf-8' });
        
        // Criar URL do Blob
        const url = URL.createObjectURL(blob);
        
        // Abrir em nova janela/aba (funciona no celular)
        window.open(url, '_blank');
        
        // Após alguns segundos, liberar a URL
        setTimeout(() => {
            URL.revokeObjectURL(url);
        }, 10000);
        
        // Feedback
        alert('📄 PDF gerado com sucesso! O arquivo será aberto automaticamente.');
    }

    // ============================================================
    // FUNÇÃO PARA ABRIR IMAGEM EM MODAL
    // ============================================================
    function openImageModal(src){
        let modal = document.getElementById('imageModal');
        if(!modal){
            modal = document.createElement('div');
            modal.id = 'imageModal';
            modal.className = 'image-modal';
            modal.innerHTML = `<img id="modalImage">`;
            modal.onclick = function(){
                modal.style.display = 'none';
            };
            document.body.appendChild(modal);
        }
        document.getElementById('modalImage').src = src;
        modal.style.display = 'flex';
    }

    // ============================================================
    // INICIALIZAÇÃO
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
        document.querySelector('.cards-grid').style.display = 'flex';
    });
</script>
