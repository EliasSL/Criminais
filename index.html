<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SIGEC - Segurança Pública</title>
    <style>
        /* ===== RESET E BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
    background: #1a1a1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: stretch;
    padding: 4px;
}

        /* ===== CONTAINER PRINCIPAL ===== */
        #app {
    max-width: 500px;
    width: 100%;
    min-height: 95vh;
    background: #2c2c2c;
    border-radius: 28px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
    overflow: hidden;
    padding: 20px 18px 30px;
    transition: all 0.3s;
    border: 1px solid #3d3d3d;
    display: flex;
    flex-direction: column;
}

        /* ===== TELA DE LOGIN ===== */
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 30px 0 20px;
        }

        #loginScreen h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #f5c842;
            text-shadow: 0 0 12px #f5c84255;
            border-bottom: 2px solid #f5c842;
            padding-bottom: 8px;
            width: 100%;
            text-align: center;
        }

        #loginScreen .sub {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: -12px;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 40px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .login-input:focus {
            border-color: #f5c842;
            box-shadow: 0 0 0 2px #f5c84233;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: #f5c842;
            color: #1a1a1a;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px #f5c84233;
        }

        .btn-login:active {
            transform: scale(0.96);
            background: #e0b032;
        }

        /* ===== HEADER / DASHBOARD ===== */
        #dashboard {
    display: none;
    flex-direction: column;
    gap: 20px;
    flex: 1;
    min-height: 0;
}

        .header-dash {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #3a3a3a;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 120px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: #f5c842;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.6rem;
            color: #1a1a1a;
            box-shadow: 0 0 0 2px #f5c84266;
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #eee;
            white-space: nowrap;
        }
        .logo-text span {
            color: #f5c842;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .btn-header {
            background: transparent;
            border: 1px solid #444;
            color: #ccc;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .btn-header:active {
            transform: scale(0.94);
        }
        .btn-header.sair {
            border-color: #b33;
            color: #f66;
        }

        /* ===== CARDS ===== */
.cards-grid {
    display: flex;
    flex-direction: column;

    gap: 16px;

    margin: 4px 0;

    flex: 1;
    justify-content: center;
}

        .card {
    background: #3b2b1a;
    border-radius: 24px;

    padding: 42px 30px;

    border: 2px solid #d4af37;

    box-shadow:
        0 0 3px #d4af37,
        0 0 8px #d4af37,
        0 0 12px #ffff00,
        0 0 18px #ccff00,
        0 0 25px rgba(204,255,0,0.7),
        0 4px 12px rgba(0,0,0,0.5);

    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;

    min-height: 280px;
}

        .card:active {
    transform: scale(0.97);

    box-shadow:
        0 0 5px #d4af37,
        0 0 15px #ffff00,
        0 0 25px #ccff00,
        0 0 35px #99ff00;
}

        .card h3 {
            font-size: 2rem;
            color: #f5e6c8;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card .badge {
    background: #f5c842;
    color: #1a1a1a;
    font-weight: 700;
    border-radius: 40px;
    font-size: 2rem;
    padding: 8px 24px;
}

        .card .card-sub {
            font-size: 0.9rem;
            color: #b99f7a;
            margin-top: 10px;
            display: flex;
            gap: 12px;
        }

        .card.mandados {

    border: 2px solid #00ff66;

    box-shadow:
        0 0 4px #00ff66,
        0 0 10px #00ff66,

        0 0 16px #ffff00,
        0 0 24px #ffff00,

        0 0 32px #ff3300,
        0 0 42px #ff0000,

        0 4px 12px rgba(0,0,0,0.5);
animation: neonMandado 2s infinite;
}

        /* ===== PÁGINAS DE LISTA ===== */
      @keyframes neonPulse {
    0% {
        box-shadow:
            0 0 3px #d4af37,
            0 0 8px #d4af37,
            0 0 12px #ffff00,
            0 0 18px #ccff00;
    }
@keyframes neonMandado {

    0% {
        box-shadow:
            0 0 4px #00ff66,
            0 0 10px #00ff66,
            0 0 16px #ffff00,
            0 0 24px #ffff00,
            0 0 32px #ff3300;
    }

    50% {
        box-shadow:
            0 0 8px #00ff66,
            0 0 18px #00ff66,
            0 0 28px #ffff00,
            0 0 38px #ff3300,
            0 0 50px #ff0000;
    }

    100% {
        box-shadow:
            0 0 4px #00ff66,
            0 0 10px #00ff66,
            0 0 16px #ffff00,
            0 0 24px #ffff00,
            0 0 32px #ff3300;
    }
}
    50% {
        box-shadow:
            0 0 5px #d4af37,
            0 0 12px #ffff00,
            0 0 22px #ccff00,
            0 0 32px #99ff00;
    }

    100% {
        box-shadow:
            0 0 3px #d4af37,
            0 0 8px #d4af37,
            0 0 12px #ffff00,
            0 0 18px #ccff00;
    }
}

        .form-page {
            display: none;

        .form-group {

        .modal-overlay {
            display: none;
            position: fixed;

<body>

<div id="app">
    <!-- ========== TELA DE LOGIN ========== -->
    <div id="loginScreen">
        <h1>⚔️ SIGEC</h1>
        <p class="sub">Sistema Integrado de Gestão e Controle</p>
        <input type="text" id="loginUser" class="login-input" placeholder="Usuário">
        <input type="password" id="loginPass" class="login-input" placeholder="Senha">
        <button class="btn-login" onclick="handleLogin()">🔐 ACESSAR</button>
        <p id="loginError" style="color:#f66; font-size:0.85rem; height:20px;"></p>
    </div>

    <!-- ========== DASHBOARD ========== -->
    <div id="dashboard">
        <!-- HEADER -->
        <div class="header-dash">
            <div class="logo-area">
                <div class="logo-icon">⚔</div>
                <div class="logo-text">SIG<span>EC</span></div>
            </div>
            <div class="header-actions">
                <button class="btn-header" onclick="openCadastro()">CADASTRAR</button>
                <button class="btn-header" onclick="openSenha()">SENHA</button>
                <button class="btn-header sair" onclick="logout()">SAIR</button>
            </div>
        </div>

        <!-- CARDS -->
        <div class="cards-grid">
            <div class="card" id="cardAnotacoes" onclick="openList('NAO')">
                <h3>
                    <span>📋 ANOTAÇÕES CRIMINAIS</span>
                    <span class="badge" id="badgeNao">0</span>
                </h3>
                <div class="card-sub"><span>Registros com MANDADO = NÃO</span></div>
            </div>
            <div class="card mandados" id="cardMandados" onclick="openList('SIM')">
                <h3>
                    <span>⚖️ MANDADOS</span>
                    <span class="badge" id="badgeSim">0</span>
                </h3>
                <div class="card-sub"><span>Registros com MANDADO = SIM</span></div>
            </div>
        </div>

        <!-- ÁREA DE CONTEÚDO DINÂMICO (listas, detalhes, formulário) -->
        <div id="dynamicContent" class="scroll-area">
            <!-- Aqui será injetado o conteúdo via JS -->
        </div>
    </div>

    <!-- ========== MODAL SENHA ========== -->
    <div class="modal-overlay" id="modalSenha">
        <div class="modal-box">
            <h3>🔑 Alterar Senha</h3>
            <input type="password" id="novaSenhaInput" placeholder="Nova senha">
            <input type="password" id="confirmSenhaInput" placeholder="Confirmar senha">
            <p id="senhaMsg" style="color:#f5c842; font-size:0.85rem; margin:6px 0;"></p>
            <div class="btn-group">
                <button class="alterar" onclick="alterarSenha()">ALTERAR</button>
                <button class="cancelar-modal" onclick="fecharModalSenha()">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- ========== LOADING ========== -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">Gerando PDF...</div>
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURAÇÕES GLOBAIS
    // ============================================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbw1U5fqEj8tYdCjx_KtuRrm3HBm1qmp5nksdr_PRTxd8ywMLWnX1VZ8vI99-t9oqGwH/exec';
    let currentUser = null;
    let allRecords = [];
    let currentView = 'dashboard';
    let currentListType = null;

    // ============================================================
    // FUNÇÃO PARA FORMATAR DATA
    // ============================================================
    function formatarData(data) {
        if (!data || data === 'N/I' || data === '—') return 'N/I';
        
        // Se for uma string no formato ISO ou GMT
        if (typeof data === 'string' && (data.includes('GMT') || data.includes('T') || data.includes('-'))) {
            try {
                const date = new Date(data);
                if (!isNaN(date.getTime())) {
                    const dia = String(date.getDate()).padStart(2, '0');
                    const mes = String(date.getMonth() + 1).padStart(2, '0');
                    const ano = date.getFullYear();
                    return `${dia}/${mes}/${ano}`;
                }
            } catch(e) {
                return data;
            }
        }
        
        // Se já estiver no formato DD/MM/AAAA, retorna como está
        if (typeof data === 'string' && /^\d{2}\/\d{2}\/\d{4}$/.test(data)) {
            return data;
        }
        
        // Tenta converter de outros formatos
        try {
            const date = new Date(data);
            if (!isNaN(date.getTime())) {
                const dia = String(date.getDate()).padStart(2, '0');
                const mes = String(date.getMonth() + 1).padStart(2, '0');
                const ano = date.getFullYear();
                return `${dia}/${mes}/${ano}`;
            }
        } catch(e) {}
        
        return data;
    }

    // ============================================================
    // FUNÇÕES DE API - USANDO JSONP PARA GET E POST VIA JSON
    // ============================================================
    
    // Função para requisições GET (JSONP)
    function callAPIGet(action, data = {}, callback) {
        const callbackName = 'jsonp_' + action + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        
        let url = API_URL + '?action=' + encodeURIComponent(action) + '&callback=' + encodeURIComponent(callbackName);
        
        for (let key in data) {
            if (data[key] !== undefined && data[key] !== null) {
                if (typeof data[key] === 'object') {
                    url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(JSON.stringify(data[key]));
                } else {
                    url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(data[key]);
                }
            }
        }
        
        window[callbackName] = function(response) {
            delete window[callbackName];
            if (callback) callback(response);
        };
        
        const script = document.createElement('script');
        script.src = url + '&_nocache=' + Date.now();
        script.onerror = function() {
            delete window[callbackName];
            if (callback) callback({ success: false, message: 'Erro na comunicação com o servidor.' });
        };
        document.body.appendChild(script);
    }

    // Função para requisições POST via JSON
    function callAPIPost(action, data = {}) {
        return new Promise((resolve, reject) => {
            const payload = {
                action: action,
                ...data
            };
            
            const options = {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            };
            
            fetch(API_URL, options)
                .then(response => {
                    resolve({ success: true, message: 'Operação realizada com sucesso!' });
                })
                .catch(error => {
                    console.error('Erro no POST:', error);
                    resolve({ success: false, message: 'Erro na comunicação: ' + error.message });
                });
        });
    }

    // Função unificada para chamar a API
    function callAPI(action, data = {}) {
        if (action === 'getRecords' || action === 'getLogin') {
            return new Promise((resolve) => {
                callAPIGet(action, data, function(response) {
                    resolve(response);
                });
            });
        }
        else {
            return callAPIPost(action, data);
        }
    }

    // ============================================================
    // FUNÇÃO PARA REDIMENSIONAR IMAGEM
    // ============================================================
    function resizeImage(file, maxWidth, maxHeight, quality) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > maxWidth) {
                            height = Math.round(height * (maxWidth / width));
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width = Math.round(width * (maxHeight / height));
                            height = maxHeight;
                        }
                    }
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', quality || 0.4);
                    resolve(dataUrl);
                };
                img.onerror = function() {
                    reject(new Error('Erro ao carregar imagem'));
                };
                img.src = e.target.result;
            };
            reader.onerror = function() {
                reject(new Error('Erro ao ler arquivo'));
            };
            reader.readAsDataURL(file);
        });
    }

            ESTADO: document.getElementById('e_estado') ? document.getElementById('e_estado').value.trim() : '',
            TIPO_PENAL: document.getElementById('e_tipo_penal') ? document.getElementById('e_tipo_penal').value.trim() : '',
            MANDADO: document.getElementById('e_mandado') ? document.getElementById('e_mandado').value : 'NÃO'
        };
        
        if (!record.NOME) {
            alert('O campo NOME é obrigatório.');
            return;
        }
        
        try {
            const result = await callAPI('updateRecord', {
                id: id,
                record: record,
                usuario: currentUser
            });
            if (result.success) {
                alert('Registro atualizado com sucesso!');
                await loadRecords();
                backToList();
            } else {
                alert('Erro ao atualizar: ' + result.message);
            }
        } catch (e) {
            alert('Erro de comunicação: ' + e.message);
        }
    }

    // ============================================================
    // SENHA
    // ============================================================
    function openSenha() {
        document.getElementById('modalSenha').style.display = 'flex';
        document.getElementById('novaSenhaInput').value = '';
        document.getElementById('confirmSenhaInput').value = '';
        document.getElementById('senhaMsg').textContent = '';
        document.getElementById('senhaMsg').style.color = '#f5c842';
    }

    function fecharModalSenha() {
        document.getElementById('modalSenha').style.display = 'none';
    }

    async function alterarSenha() {
        const nova = document.getElementById('novaSenhaInput').value.trim();
        const conf = document.getElementById('confirmSenhaInput').value.trim();
        
        if (!nova || nova.length < 4) {
            document.getElementById('senhaMsg').textContent = 'Senha deve ter pelo menos 4 caracteres.';
            document.getElementById('senhaMsg').style.color = '#f66';
            return;
        }
        
        if (nova !== conf) {
            document.getElementById('senhaMsg').textContent = 'As senhas não coincidem.';
            document.getElementById('senhaMsg').style.color = '#f66';
            return;
        }
        
        try {
            document.getElementById('senhaMsg').textContent = 'Alterando senha...';
            document.getElementById('senhaMsg').style.color = '#f5c842';
            
            const result = await callAPI('updatePassword', {
                user: currentUser,
                newPass: nova
            });
            
            if (result.success) {
                alert('Senha alterada com sucesso!');
                fecharModalSenha();
            } else {
                document.getElementById('senhaMsg').textContent = 'Erro: ' + result.message;
                document.getElementById('senhaMsg').style.color = '#f66';
            }
        } catch (error) {
            document.getElementById('senhaMsg').textContent = 'Erro de comunicação: ' + error.message;
            document.getElementById('senhaMsg').style.color = '#f66';
        }
    }

    // ============================================================
    // COMPARTILHAR - CORRIGIDO PARA MOBILE
    // ============================================================
    function shareRecord(id) {
        const rec = allRecords.find(r => r.ID == id);
        if (!rec) return;
        
        // Formata a data de nascimento
        const dataNasc = formatarData(rec.DATA_NASC);
        
        // Monta a mensagem formatada
        let msg = '*SIGEC - Registro #' + rec.ID + '*\n\n';
        msg += '📌 *Nome:* ' + (rec.NOME || 'N/I') + '\n';
        msg += '📌 *Alcunha:* ' + (rec.ALCUNHA || 'N/I') + '\n';
        msg += '📌 *Mãe:* ' + (rec.MAE || 'N/I') + '\n';
        msg += '📌 *Pai:* ' + (rec.PAI || 'N/I') + '\n';
        msg += '📌 *Data Nasc.:* ' + dataNasc + '\n';
        msg += '📌 *Naturalidade:* ' + (rec.NATURALIDADE || 'N/I') + '/' + (rec.UF_NAT || 'N/I') + '\n';
        msg += '📌 *CPF:* ' + (rec.CPF || 'N/I') + '\n';
        msg += '📌 *RG:* ' + (rec.RG || 'N/I') + ' - ' + (rec.UF_RG || 'N/I') + '\n';
        msg += '📌 *Telefone:* ' + (rec.TELEFONE || 'N/I') + '\n';
        msg += '📌 *Endereço:* ' + (rec.ENDERECO || 'N/I') + '\n';
        msg += '📌 *Cidade/UF:* ' + (rec.CIDADE || 'N/I') + '/' + (rec.ESTADO || 'N/I') + '\n';
        msg += '📌 *Tipo Penal:* ' + (rec.TIPO_PENAL || 'N/I') + '\n';
        msg += '⚖️ *Mandado:* ' + (rec.MANDADO || 'N/I');
        
        // Usa a URL https://wa.me/ que funciona em todos os navegadores
        const url = 'https://wa.me/?text=' + encodeURIComponent(msg);
        
        // Tenta abrir de forma compatível com mobile
        try {
            window.open(url, '_blank');
        } catch(e) {
            window.location.href = url;
        }
    }

    // ============================================================
    // PDF - CORRIGIDO PARA MOBILE USANDO CDN CONFIÁVEL
    // ============================================================
    function gerarPDF(id) {
        const rec = allRecords.find(r => r.ID == id);
        if (!rec) {
            alert('Registro não encontrado!');
            return;
        }
        
        // Mostra loading
        showLoading('Preparando PDF...');
        
        // Cria um container temporário para gerar o PDF
        const container = document.createElement('div');
        container.style.cssText = 'position:fixed;left:-9999px;top:0;width:800px;background:#fff;padding:40px;font-family:Arial,sans-serif;color:#333;';
        document.body.appendChild(container);
        
        // Formata a data de nascimento
        const dataNasc = formatarData(rec.DATA_NASC);
        
        // Monta o conteúdo do PDF
        let html = `
            <div style="text-align:center;border-bottom:3px solid #f5c842;padding-bottom:20px;margin-bottom:20px;">
                <h1 style="color:#1a1a1a;font-size:28px;">⚔️ SIGEC</h1>
                <p style="color:#666;font-size:14px;">Sistema Integrado de Gestão e Controle</p>
                <p style="color:#999;font-size:12px;">Documento gerado em ${new Date().toLocaleString('pt-BR')}</p>
            </div>
            
            <div style="display:flex;gap:30px;margin-bottom:30px;">
                <div style="flex:1;">
                    <h2 style="color:#f5c842;font-size:20px;border-bottom:2px solid #eee;padding-bottom:10px;">Dados Pessoais</h2>
                    <table style="width:100%;border-collapse:collapse;margin-top:15px;">
        `;
        
        const campos = [
            ['ID', rec.ID || 'N/I'],
            ['NOME', rec.NOME || 'N/I'],
            ['ALCUNHA', rec.ALCUNHA || 'N/I'],
            ['MÃE', rec.MAE || 'N/I'],
            ['PAI', rec.PAI || 'N/I'],
            ['DATA NASC.', dataNasc],
            ['NATURALIDADE', (rec.NATURALIDADE || 'N/I') + ' - ' + (rec.UF_NAT || 'N/I')],
            ['CPF', rec.CPF || 'N/I'],
            ['RG', (rec.RG || 'N/I') + ' - ' + (rec.UF_RG || 'N/I')],
            ['TELEFONE', rec.TELEFONE || 'N/I']
        ];
        
        campos.forEach(([label, valor]) => {
            html += `
                <tr>
                    <td style="padding:8px 12px;font-weight:bold;color:#555;border-bottom:1px solid #eee;width:40%;">${label}</td>
                    <td style="padding:8px 12px;border-bottom:1px solid #eee;">${valor}</td>
                </tr>
            `;
        });
        
        html += `
                    </table>
                </div>
                <div style="width:200px;text-align:center;">
                    ${rec.FOTO ? `<img src="${rec.FOTO}" style="width:180px;height:220px;object-fit:cover;border-radius:12px;border:3px solid #f5c842;">` : '<div style="width:180px;height:220px;border:2px dashed #ccc;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#999;">Sem foto</div>'}
                </div>
            </div>
            
            <div style="margin-top:20px;">
                <h2 style="color:#f5c842;font-size:20px;border-bottom:2px solid #eee;padding-bottom:10px;">Informações Adicionais</h2>
                <table style="width:100%;border-collapse:collapse;margin-top:15px;">
        `;
        
        const adicionais = [
            ['ENDEREÇO', rec.ENDERECO || 'N/I'],
            ['CIDADE / ESTADO', (rec.CIDADE || 'N/I') + ' - ' + (rec.ESTADO || 'N/I')],
            ['TIPO PENAL', rec.TIPO_PENAL || 'N/I'],
            ['MANDADO', rec.MANDADO || 'N/I']
        ];
        
        adicionais.forEach(([label, valor]) => {
            html += `
                <tr>
                    <td style="padding:8px 12px;font-weight:bold;color:#555;border-bottom:1px solid #eee;width:40%;">${label}</td>
                    <td style="padding:8px 12px;border-bottom:1px solid #eee;">${valor}</td>
                </tr>
            `;
        });
        
        html += `
                    </table>
                </div>
                
                <div style="margin-top:40px;padding-top:20px;border-top:2px solid #eee;text-align:center;color:#999;font-size:12px;">
                    Documento gerado pelo SIGEC - Sistema Integrado de Gestão e Controle
                </div>
            </div>
        `;
        
        container.innerHTML = html;
        
        // Carrega as bibliotecas e gera o PDF
        carregarBibliotecasPDF(container, rec);
    }

    function carregarBibliotecasPDF(container, rec) {
        // Verifica se html2canvas já está carregado
        if (typeof html2canvas === 'undefined') {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
            script.onload = function() {
                carregarJsPDF(container, rec);
            };
            script.onerror = function() {
                document.body.removeChild(container);
                hideLoading();
                alert('Erro ao carregar bibliotecas. Verifique sua conexão com a internet.');
            };
            document.head.appendChild(script);
        } else {
            carregarJsPDF(container, rec);
        }
    }

    function carregarJsPDF(container, rec) {
        if (typeof window.jspdf === 'undefined') {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
            script.onload = function() {
                gerarPDFComImagem(container, rec);
            };
            script.onerror = function() {
                document.body.removeChild(container);
                hideLoading();
                alert('Erro ao carregar bibliotecas. Verifique sua conexão com a internet.');
            };
            document.head.appendChild(script);
        } else {
            gerarPDFComImagem(container, rec);
        }
    }

    function gerarPDFComImagem(container, rec) {
        html2canvas(container, {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff',
            allowTaint: true,
            logging: false
        }).then(function(canvas) {
            document.body.removeChild(container);
            criarPDFComJsPDF(canvas, rec);
        }).catch(function(error) {
            document.body.removeChild(container);
            hideLoading();
            console.error('Erro ao gerar PDF:', error);
            alert('Erro ao gerar PDF: ' + error.message);
        });
    }

    function criarPDFComJsPDF(canvas, rec) {
        try {
            if (typeof window.jspdf === 'undefined') {
                hideLoading();
                alert('Biblioteca PDF não carregada. Tente novamente.');
                return;
            }
            
            const { jsPDF } = window.jspdf;
            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            
            pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
            pdf.save('SIGEC_Registro_' + (rec.ID || '') + '.pdf');
            
            hideLoading();
        } catch (error) {
            hideLoading();
            console.error('Erro ao criar PDF:', error);
            alert('Erro ao criar PDF: ' + error.message);
        }
    }

    // ============================================================
    // FUNÇÕES DE LOADING
    // ============================================================
    function showLoading(text) {
        const overlay = document.getElementById('loadingOverlay');
        const textEl = document.getElementById('loadingText');
        if (text) textEl.textContent = text;
        overlay.style.display = 'flex';
    }

    function hideLoading() {
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    // ============================================================
    // IMAGE MODAL
    // ============================================================
    function openImageModal(src){
        let modal = document.getElementById('imageModal');

        if(!modal){
            modal = document.createElement('div');
            modal.id = 'imageModal';
            modal.className = 'image-modal';

            modal.innerHTML = `
                <img id="modalImage">
            `;

            modal.onclick = function(){
                modal.style.display = 'none';
            };

            document.body.appendChild(modal);
        }

        document.getElementById('modalImage').src = src;
        modal.style.display = 'flex';
    }

    // ============================================================
    // INICIALIZAÇÃO
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
        document.querySelector('.cards-grid').style.display = 'flex';
    });
</script>
